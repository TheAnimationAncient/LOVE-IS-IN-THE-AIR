<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Experience ❤️</title>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* ================= PAGE SYSTEM ================= */

.page{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:60px 20px;
}

/* ================= MEMORY GAME ================= */

#gamePage{
background:radial-gradient(circle at center,#450000,#000);
}

#gameTitle{
color:gold;
font-size:30px;
margin-bottom:30px;
text-shadow:0 0 15px gold;
}

#game{
display:grid;
grid-template-columns:repeat(4,85px);
gap:18px;
perspective:1000px;
}

.card{
width:85px;
height:105px;
position:relative;
transform-style:preserve-3d;
transition:transform .5s;
cursor:pointer;
}

.card.flip{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
backface-visibility:hidden;
}

.front{
background:linear-gradient(135deg,#600000,#a00000);
box-shadow:0 0 25px crimson;
}

.back{
background:linear-gradient(135deg,#ff4d6d,#ff0055);
transform:rotateY(180deg);
box-shadow:0 0 35px hotpink;
}

/* ================= TEXT PAGE ================= */

#textPage{
display:none;
background:radial-gradient(circle at center,#180000,#000);
position:relative;
overflow:hidden;
}

#textCard{
max-width:850px;
background:rgba(20,0,0,0.95);
padding:70px;
border-radius:30px;
box-shadow:0 0 80px crimson;
position:relative;
z-index:2;
}

#textCard h1{
text-align:center;
font-size:38px;
background:linear-gradient(90deg,gold,white,gold);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;
margin-bottom:50px;
}

@keyframes shine{
0%{background-position:0%;}
100%{background-position:200%;}
}

/* WORD GLOW */
.word{
display:inline-block;
margin-right:6px;
animation:wordGlow 2.5s ease-in-out infinite alternate;
}

@keyframes wordGlow{
from{text-shadow:0 0 4px rgba(255,255,255,0.2);}
to{text-shadow:0 0 12px gold;}
}

/* Highlight strong lines */
.highlight{
color:gold;
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{text-shadow:0 0 8px gold;}
to{text-shadow:0 0 20px gold;}
}

.para{
line-height:2;
margin-bottom:26px;
font-size:17px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s forwards;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

/* Roses */
.rose{
position:absolute;
top:-50px;
font-size:28px;
animation:fall linear infinite;
opacity:1;
pointer-events:none;
z-index:1;
}

@keyframes fall{
to{transform:translateY(120vh) rotate(360deg);}
}

#surprise2{
margin-top:100px;
font-size:24px;
color:gold;
cursor:pointer;
text-shadow:0 0 10px gold;
}

/* ================= EGG PAGE ================= */

#eggPage{
display:none;
background:black;
}

#egg{
width:240px;
height:310px;
background:radial-gradient(circle at 50% 40%, #fff8dc, #f5deb3);
border-radius:50% 50% 45% 45%;
box-shadow:0 0 60px gold;
cursor:pointer;
animation:eggFloat 3s ease-in-out infinite alternate;
}

@keyframes eggFloat{
from{transform:translateY(0);}
to{transform:translateY(-18px);}
}

/* ================= PUZZLE ================= */

#puzzlePage{
display:none;
background:black;
position:relative;
}

#puzzle{
width:330px;
height:330px;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:2px;
}

.piece{
background-size:330px 330px;
cursor:pointer;
transition:.2s;
}

.piece.correct{
box-shadow:0 0 25px gold;
}

/* Celebration */
#celebration{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,gold,transparent);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
font-size:40px;
z-index:999;
animation:flash 1s forwards;
}

@keyframes flash{
from{opacity:0;}
to{opacity:1;}
}

.confetti{
position:fixed;
font-size:28px;
animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
to{transform:translateY(100vh);opacity:0;}
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f1c48f1a6.mp3?filename=romantic-background-112191.mp3" type="audio/mp3">
</audio>

<div id="gamePage" class="page">
<div id="gameTitle">Match The Hearts ❤️</div>
<div id="game"></div>
</div>

<div id="textPage" class="page">
<div id="textCard">
<h1>Happy 2nd Month Anniversary ❤️</h1>
<div id="textContent"></div>
</div>
<div id="surprise2">Go To Surprise 2 ❤️</div>
</div>

<div id="eggPage" class="page">
<div id="egg"></div>
</div>

<div id="puzzlePage" class="page">
<h2>Final Memory 🧩</h2>
<div id="puzzle"></div>
</div>

<div id="celebration">
<div>Forever Us ❤️</div>
</div>

<script>

/* Preload image */
const puzzleImageURL="https://i.imgur.com/gblI6k3.jpeg";
new Image().src=puzzleImageURL;

/* MEMORY GAME */
const emojis=["❤️","🌙","🌹","⭐","💖","💛"];
let cards=[...emojis,...emojis];
cards.sort(()=>0.5-Math.random());
const game=document.getElementById("game");
let first=null, lock=false, matches=0;

cards.forEach(symbol=>{
let card=document.createElement("div");
card.className="card";
card.innerHTML=`<div class="face front"></div><div class="face back">${symbol}</div>`;
card.onclick=()=>{
if(lock||card===first||card.classList.contains("flip")) return;
card.classList.add("flip");
if(!first){first=card;}
else{
if(first.querySelector(".back").textContent===symbol){
matches++; first=null;
if(matches===6){
document.getElementById("bgMusic").play();
setTimeout(()=>{
document.getElementById("gamePage").style.display="none";
document.getElementById("textPage").style.display="flex";
renderText();
createRoses();
},800);
}
}else{
lock=true;
setTimeout(()=>{
card.classList.remove("flip");
first.classList.remove("flip");
first=null; lock=false;
},600);
}
}
};
game.appendChild(card);
});

/* FULL TEXT WORD GLOW */
function renderText(){
const fullText=`Happy 2nd month anniversary and Happy Valentine’s Day to my sweetest wifey.

I can’t stop thinking about you. It feels really special when I think that you are mine — mine only.

I’m truly grateful to have you in my life. You make me feel so special and so loved.

I know you understand me so well. I just don’t always express it. Sometimes when I think about how much you do for me, I feel like I’m not showing you enough love.

But I love you to the moon and back.

I want you to always be with me — loving each other with kindness, with a heart full of joy, and one day even with our kids.

Even when we are angry, I’m still grateful that you are in my life. You give me so much joy and happiness. Whenever you are close to me, I feel like I have everything.

Loving you always feels like it’s still not enough. I can never stop loving you, babe.

I want to love you even after death, even after this life.

You once asked me why I love you. I love you because you make me feel truly seen and supported.

I love how brave you are. And when you said you would protect me — I smiled, because of course I will protect you too.

I love the way I feel when I’m around you — happier, calmer, and more alive.

Babe, you are my everything — my wife, my girlfriend, my best friend, and my home.

I can’t even imagine life without you. Without you, there is no point in living.

I want to love your family as my own family. I want to respect and love your dad as my own.

I love you chalaaaaa ante chalaaaaaaaa ❤️❤️❤️

From your dearest hubby,
Mackwin Maxin ❤️❤️`;

let container=document.getElementById("textContent");
fullText.split("\n\n").forEach((para,i)=>{
let div=document.createElement("div");
div.className="para";
div.style.animationDelay=(i*0.4)+"s";

para.split(" ").forEach(word=>{
let span=document.createElement("span");
span.className="word";
span.textContent=word;
if(word.includes("love") || word.includes("Love")){
span.classList.add("highlight");
}
div.appendChild(span);
});

container.appendChild(div);
});
}

/* Roses */
function createRoses(){
for(let i=0;i<35;i++){
let r=document.createElement("div");
r.className="rose";
r.textContent="🌹";
r.style.left=Math.random()*100+"vw";
r.style.animationDuration=(Math.random()*4+4)+"s";
document.getElementById("textPage").appendChild(r);
}
}

/* Surprise 2 */
document.getElementById("surprise2").onclick=function(){
document.getElementById("textPage").style.display="none";
document.getElementById("eggPage").style.display="flex";
};

/* Egg */
document.getElementById("egg").onclick=function(){
document.getElementById("eggPage").style.display="none";
document.getElementById("puzzlePage").style.display="flex";
};

/* Puzzle */
const puzzle=document.getElementById("puzzle");
let pieces=[];
for(let r=0;r<3;r++){
for(let c=0;c<3;c++){
let piece=document.createElement("div");
piece.className="piece";
piece.style.backgroundImage=`url('${puzzleImageURL}')`;
piece.style.backgroundPosition=`-${c*110}px -${r*110}px`;
pieces.push(piece);
}
}
pieces.sort(()=>0.5-Math.random());
pieces.forEach(p=>puzzle.appendChild(p));

let selected=null;
puzzle.addEventListener("click",e=>{
if(!e.target.classList.contains("piece")) return;
if(!selected){
selected=e.target;
selected.style.outline="2px solid gold";
}else{
let temp=selected.style.backgroundPosition;
selected.style.backgroundPosition=e.target.style.backgroundPosition;
e.target.style.backgroundPosition=temp;
selected.style.outline="none";
selected=null;
checkPuzzle();
}
});

function checkPuzzle(){
let correct=0;
document.querySelectorAll(".piece").forEach((piece,i)=>{
let row=Math.floor(i/3);
let col=i%3;
let expected=`-${col*110}px -${row*110}px`;
if(piece.style.backgroundPosition===expected){
correct++;
}
});
if(correct===9){
celebrate();
}
}

function celebrate(){
let c=document.getElementById("celebration");
c.style.display="flex";
for(let i=0;i<40;i++){
let conf=document.createElement("div");
conf.className="confetti";
conf.textContent="✨";
conf.style.left=Math.random()*100+"vw";
conf.style.top="-20px";
document.body.appendChild(conf);
setTimeout(()=>conf.remove(),3000);
}
}
</script>

</body>
</html>
